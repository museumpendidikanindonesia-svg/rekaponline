<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard MPI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  min-height:100vh;
  background:url('assets/bg.jpg') center/cover no-repeat;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
}

/* CONTAINER */
.wrapper{
  position:relative;
  z-index:2;
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}
.header img{
  width:90px;
  margin-bottom:10px;
}
.header h1{
  font-size:26px;
  font-weight:600;
}

/* GLASS PANEL */
.panel{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}
.card{
  border-radius:20px;
  padding:15px;
  color:white;
}
.card h4{font-size:14px}
.card span{font-size:24px;font-weight:600}

.blue{background:linear-gradient(135deg,#3b82f6,#60a5fa)}
.orange{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.green{background:linear-gradient(135deg,#10b981,#34d399)}
.purple{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}

/* FORM */
.form{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:15px;
}
input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* FILTER */
.filter{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* TABLE */
.table{
  background:white;
  border-radius:15px;
  overflow:hidden;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  text-align:center;
}
th{
  background:#2563eb;
  color:white;
}
tr:nth-child(even){
  background:#f1f5f9;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="wrapper">

<div class="header">
  <img src="assets/logo.png">
  <h1>Dashboard Kunjungan MPI</h1>
</div>

<div class="panel">

<!-- CARDS -->
<div class="cards">
  <div class="card blue">
    <h4>Total Pengunjung</h4>
    <span id="totalPengunjung">0</span>
  </div>
  <div class="card orange">
    <h4>Total UNY</h4>
    <span id="totalUNY">0</span>
  </div>
  <div class="card green">
    <h4>Total Umum</h4>
    <span id="totalUmum">0</span>
  </div>
  <div class="card purple">
    <h4>Total Pemasukan</h4>
    <span id="totalUang">0</span>
  </div>
</div>

<!-- FILTER -->
<div class="filter">
  <div>Tambah Data</div>
  <div>
    <select id="bulan" onchange="render()">
      <option value="">Semua</option>
      <option value="0">Jan</option>
      <option value="1">Feb</option>
      <option value="2">Mar</option>
      <option value="3">Apr</option>
      <option value="4">Mei</option>
      <option value="5">Jun</option>
      <option value="6">Jul</option>
      <option value="7">Agu</option>
      <option value="8">Sep</option>
      <option value="9">Okt</option>
      <option value="10">Nov</option>
      <option value="11">Des</option>
    </select>
    <input type="number" id="tahun" placeholder="2026" oninput="render()">
  </div>
</div>

<!-- FORM -->
<form id="form" class="form">
  <input type="date" id="tanggal" required>
  <input type="text" id="nama" placeholder="Nama">

  <select id="kategori">
    <option>Umum</option>
    <option>TK</option>
    <option>SD</option>
    <option>SMP</option>
    <option>SMA</option>
    <option>Universitas</option>
    <option>UNY</option>
  </select>

  <select id="paket">
    <option>Umum</option>
    <option>Sabak</option>
    <option>Paket</option>
    <option>Grip</option>
    <option>Ongotan</option>
  </select>

  <input type="number" id="jumlah" placeholder="Jumlah">
  <button type="submit">Tambah</button>
</form>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Nama</th>
<th>Paket</th>
<th>Jumlah</th>
<th>Total</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

</div>

<script>

const harga = {
  Umum:10000,
  Sabak:10000,
  Paket:35000,
  Grip:50000,
  Ongotan:100000
};

let data = JSON.parse(localStorage.getItem("mpiData")) || [];

document.getElementById("form").onsubmit = e=>{
  e.preventDefault();

  let kategori = kategoriEl.value;
  let paket = paketEl.value;
  let jumlah = +jumlahEl.value;

  let h = kategori==="UNY"?0:harga[paket];
  let total = h * jumlah;

  data.push({
    tanggal:tanggalEl.value,
    nama:namaEl.value,
    kategori,
    paket,
    jumlah,
    total
  });

  localStorage.setItem("mpiData", JSON.stringify(data));
  render();
};

const tanggalEl = document.getElementById("tanggal");
const namaEl = document.getElementById("nama");
const kategoriEl = document.getElementById("kategori");
const paketEl = document.getElementById("paket");
const jumlahEl = document.getElementById("jumlah");

function render(){
  let tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let totalPengunjung=0,totalUNY=0,totalUmum=0,totalUang=0;

  data.forEach((d,i)=>{
    totalPengunjung+=d.jumlah;
    totalUang+=d.total;

    if(d.kategori==="UNY") totalUNY+=d.jumlah;
    else totalUmum+=d.jumlah;

    tbody.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${d.tanggal}</td>
      <td>${d.nama}</td>
      <td>${d.paket}</td>
      <td>${d.jumlah}</td>
      <td>Rp ${d.total}</td>
      <td><button onclick="hapus(${i})">Hapus</button></td>
    </tr>`;
  });

  document.getElementById("totalPengunjung").innerText=totalPengunjung;
  document.getElementById("totalUNY").innerText=totalUNY;
  document.getElementById("totalUmum").innerText=totalUmum;
  document.getElementById("totalUang").innerText="Rp "+totalUang;
}

function hapus(i){
  data.splice(i,1);
  localStorage.setItem("mpiData", JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
