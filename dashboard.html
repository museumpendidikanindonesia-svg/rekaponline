<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/data.js"></script>
<script defer src="js/dashboard.js"></script>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <div><b>MPI</b></div>
  <div class="nav-menu">
    <div class="nav-item active">Dashboard</div>
    <div class="nav-item" onclick="goStatistik()">Statistik</div>
  </div>
</div>

<div class="container">

<div class="cards">
  <div class="card blue">Total <span id="totalPengunjung"></span></div>
  <div class="card orange">UNY <span id="totalUNY"></span></div>
  <div class="card green">Umum <span id="totalUmum"></span></div>
  <div class="card purple">Rp <span id="totalUang"></span></div>
</div>

<form id="form" class="form">
<input type="date" id="tanggal">
<input type="text" id="nama">
<select id="kategori">
<option>Umum</option><option>UNY</option>
</select>
<select id="paket">
<option>Umum</option><option>Grip</option>
</select>
<input type="number" id="jumlah">
<button>Tambah</button>
</form>

<table>
<thead><tr><th>No</th><th>Tanggal</th><th>Nama</th><th>Paket</th><th>Jumlah</th><th>Total</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

</div>

</body>
</html>
