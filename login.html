<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Museum Pendidikan Indonesia</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  height:100vh;
  background: linear-gradient(180deg,#ffffff,#eef2ff);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Inter', sans-serif;
  color:#1e293b;
  transition:opacity 0.6s ease;
}

/* BACKGROUND SHAPES */
.bg {
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
}

.shape {
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.6;
  animation: float 18s infinite ease-in-out;
}

.shape:nth-child(1){
  width:350px;
  height:350px;
  background:#2563eb;
  top:20%;
  left:10%;
}

.shape:nth-child(2){
  width:450px;
  height:450px;
  background:#3b82f6;
  top:60%;
  left:70%;
}

.shape:nth-child(3){
  width:300px;
  height:300px;
  background:#1d4ed8;
  top:75%;
  left:30%;
}

@keyframes float {
  0% { transform:translateY(0); }
  50% { transform:translateY(-50px); }
  100% { transform:translateY(0); }
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  width:100%;
  max-width:380px;
  padding:20px;
  text-align:center;
}

/* LOGO */
.logo {
  width:120px;
  margin-bottom:15px;
  animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-10px); }
}

/* TITLE */
.title {
  font-family:'Playfair Display', serif;
  font-size:26px;
  margin-bottom:20px;
  background: linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.75);
  border-radius:18px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* FORM */
.form-group {
  margin-bottom:15px;
  text-align:left;
}

label {
  font-size:13px;
  color:#475569;
}

input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  margin-top:5px;
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  opacity:0.9;
}

/* ERROR */
.error {
  color:#dc2626;
  font-size:12px;
  margin-top:10px;
  display:none;
}

/* BACK */
.back {
  margin-top:15px;
  font-size:13px;
  color:#64748b;
  cursor:pointer;
}

/* FADE */
.fade-out {
  opacity:0;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<!-- CONTENT -->
<div class="container">

  <img src="assets/logo.png" class="logo">

  <div class="title">Login Admin MPI</div>

  <div class="card">
    <form onsubmit="login(event)">

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Masuk</button>

      <div class="error" id="error">
        Username atau password salah
      </div>

    </form>
  </div>

  <div class="back" onclick="goBack()">← Kembali ke Landing</div>

</div>

<script>
function login(e){
  e.preventDefault();

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  // LOGIN SEMENTARA
  if(user === "admin" && pass === "123"){
    document.body.classList.add("fade-out");
    setTimeout(()=>{
      window.location.href = "dashboard.html";
    }, 600);
  } else {
    document.getElementById("error").style.display = "block";
  }
}

function goBack(){
  document.body.classList.add("fade-out");
  setTimeout(()=>{
    window.location.href = "index.html";
  }, 600);
}
</script>

</body>
</html>
