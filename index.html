<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Pendidikan Indonesia</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  background: linear-gradient(180deg,#ffffff,#f1f5f9);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#1e293b;
}

/* FLOATING SOFT SHAPES */
.bg {
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.shape {
  position:absolute;
  border-radius:50%;
  filter: blur(60px);
  opacity:0.4;
  animation: float 20s infinite ease-in-out;
}

/* SOFT BLUE + WHITE */
.shape:nth-child(1){
  width:300px;height:300px;
  background:#93c5fd;
  top:20%; left:10%;
}
.shape:nth-child(2){
  width:400px;height:400px;
  background:#dbeafe;
  top:60%; left:70%;
  animation-duration:25s;
}
.shape:nth-child(3){
  width:250px;height:250px;
  background:#bfdbfe;
  top:80%; left:30%;
  animation-duration:18s;
}

@keyframes float {
  0% { transform:translateY(0);}
  50% { transform:translateY(-40px);}
  100% { transform:translateY(0);}
}

/* CONTENT */
.container {
  position:relative;
  z-index:2;
  text-align:center;
  backdrop-filter: blur(10px);
}

/* LOGO FLOAT */
.logo {
  width:140px;
  margin-bottom:20px;
  animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform:translateY(0);}
  50% { transform:translateY(-12px);}
}

/* TEXT */
.title {
  font-size:34px;
  font-weight:600;
  margin-bottom:10px;
  opacity:0;
  animation: fadeIn 1.5s ease forwards;
}

.subtitle {
  font-size:18px;
  color:#64748b;
  opacity:0;
  animation: fadeIn 2s ease forwards;
  animation-delay:0.8s;
}

/* FADE */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(15px);}
  to { opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<!-- CONTENT -->
<div class="container">
  <img src="assets/logo.png" class="logo">
  <div class="title">Museum Pendidikan Indonesia</div>
  <div class="subtitle">Museum di Hatiku</div>
</div>

</body>
</html>
