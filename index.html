<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Pendidikan Indonesia</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* FLOATING BACKGROUND */
.bg {
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.circle {
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  animation: float 20s infinite linear;
}

.circle:nth-child(1){
  width:200px;height:200px;left:10%;top:20%;
}
.circle:nth-child(2){
  width:300px;height:300px;left:70%;top:60%;
  animation-duration:25s;
}
.circle:nth-child(3){
  width:150px;height:150px;left:40%;top:80%;
  animation-duration:18s;
}

@keyframes float {
  0% { transform:translateY(0px) rotate(0deg);}
  50% { transform:translateY(-40px) rotate(180deg);}
  100% { transform:translateY(0px) rotate(360deg);}
}

/* CONTENT */
.container {
  position:relative;
  z-index:2;
  text-align:center;
}

/* LOGO FLOAT */
.logo {
  width:150px;
  margin-bottom:20px;
  animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform:translateY(0);}
  50% { transform:translateY(-15px);}
}

/* TEXT */
.title {
  font-size:32px;
  opacity:0;
  animation: fadeIn 2s ease forwards;
  animation-delay:1s;
}

.subtitle {
  margin-top:10px;
  font-size:18px;
  opacity:0;
  animation: fadeIn 2s ease forwards;
  animation-delay:2s;
  color:#cbd5f5;
}

@keyframes fadeIn {
  to { opacity:1; transform:translateY(0);}
  from { opacity:0; transform:translateY(20px);}
}

</style>
</head>

<body>

<!-- BACKGROUND FLOAT -->
<div class="bg">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
</div>

<!-- CONTENT -->
<div class="container">
  <img src="assets/logo.png" class="logo">
  <div class="title">Museum Pendidikan Indonesia</div>
  <div class="subtitle">Museum di Hatiku</div>
</div>

</body>
</html>
