<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Pendidikan Indonesia</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  height:100vh;
  overflow:hidden;
  background: linear-gradient(180deg,#ffffff,#eef2ff);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#1e293b;
  font-family: 'Inter', sans-serif;
  transition: opacity 0.8s ease;
}

/* BACKGROUND */
.bg {
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
}

.shape {
  position:absolute;
  border-radius:50%;
  filter: blur(80px);
  opacity:0.6;
  animation: float 18s infinite ease-in-out;
}

.shape:nth-child(1){
  width:350px;height:350px;
  background:#2563eb;
  top:20%; left:10%;
}
.shape:nth-child(2){
  width:450px;height:450px;
  background:#3b82f6;
  top:60%; left:70%;
}
.shape:nth-child(3){
  width:300px;height:300px;
  background:#1d4ed8;
  top:75%; left:30%;
}

@keyframes float {
  0% { transform:translateY(0);}
  50% { transform:translateY(-50px);}
  100% { transform:translateY(0);}
}

/* CONTENT */
.container {
  position:relative;
  z-index:2;
  text-align:center;
}

/* LOGO */
.logo {
  width:150px;
  margin-bottom:20px;
  animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
  0%,100% { transform:translateY(0);}
  50% { transform:translateY(-12px);}
}

/* TITLE */
.title {
  font-family: 'Playfair Display', serif;
  font-size:38px;
  font-weight:600;
  margin-bottom:10px;
  letter-spacing:0.5px;
  background: linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  opacity:0;
  animation: fadeIn 1.5s ease forwards;
}

/* SUBTITLE */
.subtitle {
  font-size:18px;
  color:#475569;
  letter-spacing:1px;
  opacity:0;
  animation: fadeIn 2s ease forwards;
  animation-delay:0.8s;
}

/* ARROW BUTTON */
.arrow {
  margin-top:40px;
  font-size:28px;
  color:white;
  background:#2563eb;
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer;
  opacity:0;
  animation: fadeIn 2s ease forwards, slideRight 1.5s infinite;
  animation-delay:1.5s;
}

/* ANIMASI KE KANAN */
@keyframes slideRight {
  0%,100% { transform:translateX(0);}
  50% { transform:translateX(12px);}
}

/* FADE */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px);}
  to { opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<!-- CONTENT -->
<div class="container">
  <img src="assets/logo.png" class="logo">
  <div class="title">Museum Pendidikan Indonesia</div>
  <div class="subtitle">Museum di Hatiku</div>

  <!-- PANAH KE LOGIN -->
  <div class="arrow" onclick="goLogin()">→</div>
</div>

<script>
function goLogin(){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    window.location.href = "login.html";
  }, 800);
}
</script>

</body>
</html>
