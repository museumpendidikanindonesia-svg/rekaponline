<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik MPI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:url('assets/bg.jpg') center/cover no-repeat;
  min-height:100vh;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
}

.navbar{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(255,255,255,0.8);
}

.nav-menu{display:flex;gap:20px}
.nav-item{cursor:pointer;padding:6px 12px;border-radius:10px}
.active{background:#2563eb;color:white}

.wrapper{
  position:relative;
  z-index:2;
  max-width:1100px;
  margin:30px auto;
}

.container{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

canvas{margin-bottom:30px}
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <div><b>Museum Pendidikan Indonesia</b></div>
  <div class="nav-menu">
    <div class="nav-item" onclick="goDash()">Dashboard</div>
    <div class="nav-item active">Statistik</div>
    <div class="nav-item" onclick="logout()">Logout</div>
  </div>
</div>

<div class="wrapper">
<div class="container">

<div class="top-bar">
  <div>
    Tahun:
    <select id="tahunSelect" onchange="loadChart()"></select>
  </div>
  <div>
    <button onclick="exportPNG()">Export PNG</button>
    <button onclick="exportPDF()">Export PDF</button>
  </div>
</div>

<canvas id="pengunjungChart"></canvas>
<canvas id="uangChart"></canvas>
<canvas id="kategoriChart"></canvas>
<canvas id="paketChart"></canvas>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("mpiData")) || [];

// ambil tahun unik
let tahunSet = [...new Set(data.map(d=> new Date(d.tanggal).getFullYear()))];
let tahunSelect = document.getElementById("tahunSelect");

tahunSet.forEach(t=>{
  let opt = document.createElement("option");
  opt.value=t; opt.text=t;
  tahunSelect.appendChild(opt);
});

if(tahunSet.length) tahunSelect.value = tahunSet[0];

let charts=[];

function loadChart(){

charts.forEach(c=>c.destroy());
charts=[];

let tahun = tahunSelect.value;

let bulan = new Array(12).fill(0);
let uang = new Array(12).fill(0);
let kategoriCount = {};
let paketCount = {};

data.forEach(d=>{
  let t = new Date(d.tanggal);
  if(t.getFullYear()==tahun){
    let b = t.getMonth();
    bulan[b]+=d.jumlah;
    uang[b]+=d.total;

    kategoriCount[d.kategori]=(kategoriCount[d.kategori]||0)+d.jumlah;
    paketCount[d.paket]=(paketCount[d.paket]||0)+d.jumlah;
  }
});

let labelBulan=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];

// BAR
charts.push(new Chart(pengunjungChart,{
type:'bar',
data:{labels:labelBulan,datasets:[{label:'Pengunjung',data:bulan}]},
options:{animation:{duration:1200}}
}));

// LINE
charts.push(new Chart(uangChart,{
type:'line',
data:{labels:labelBulan,datasets:[{label:'Pemasukan',data:uang}]},
options:{animation:{duration:1200},tension:0.4}
}));

// PIE
charts.push(new Chart(kategoriChart,{
type:'pie',
data:{
labels:Object.keys(kategoriCount),
datasets:[{data:Object.values(kategoriCount)}]
},
options:{animation:{duration:1200}}
}));

// DOUGHNUT
charts.push(new Chart(paketChart,{
type:'doughnut',
data:{
labels:Object.keys(paketCount),
datasets:[{data:Object.values(paketCount)}]
},
options:{animation:{duration:1200}}
}));

}

function exportPNG(){
let canvas=document.querySelector("canvas");
let link=document.createElement("a");
link.download="chart.png";
link.href=canvas.toDataURL();
link.click();
}

function exportPDF(){
let pdf=new jspdf.jsPDF();
pdf.text("Statistik MPI",10,10);

document.querySelectorAll("canvas").forEach((c,i)=>{
pdf.addImage(c.toDataURL(),"PNG",10,20+(i*60),180,50);
});

pdf.save("statistik.pdf");
}

function goDash(){window.location.href="dashboard.html"}
function logout(){window.location.href="login.html"}

loadChart();
</script>

</body>
</html>
